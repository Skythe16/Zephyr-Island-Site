<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zephyr Island info page</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <div class="logo">
        <a href="/">
          <img src="/images/clean-logo.png" alt="Zephyr Island Logo" class="logo-img">
          Zephyr Island
        </a>
      </div>

      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/media">Media</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="about-page">
    <h1>All About the Boys</h1>

    <div class="image-container">
      <figure class="bio-card">
        <img src="/images/band-group.JPG" alt="The boys">
        <figcaption>
          Zephyr Island is a psychedelic rock band from Houston, Texas, 
          blending atmospheric textures with driving rhythms and memorable melodies. 
          Their sound moves between immersive soundscapes and energetic live performances, 
          creating a dynamic experience that connects with a wide range of audiences. 
          With a focus on tight musicianship and expressive songwriting, Zephyr Island brings both 
          depth and energy to every stage they play.
        </figcaption>
      </figure>

      <figure class="bio-card">
        <img src="/images/bonk-close.jpg" alt="Bonk bonkanado">
        <figcaption>
          Lincoln is the voice and rhythmic backbone of Zephyr Island. 
          With a strong sense of melody and a knack for storytelling, he brings songs to life both on stage and in the studio. 
          Whether he’s leading a crowd through a chorus or locking in a groove on guitar, 
          Lincoln keeps the band grounded and connected to its sound.
        </figcaption>
      </figure>

      <figure class="bio-card">
        <img src="/images/andy-close.jpg" alt="Andrew the bassist">
        <figcaption>
          Andrew lays down the foundation of Zephyr Island’s sound with driving basslines and a tight rhythmic feel. 
          His playing bridges the gap between melody and rhythm, 
          giving the music both movement and depth. Offstage, he’s just as focused on refining 
          the band’s sound and pushing it forward.
        </figcaption>
      </figure>

      <figure class="bio-card">
        <img src="/images/ian-close.jpg" alt="Ian the guitarist">
        <figcaption>
          Ian adds color and energy to Zephyr Island with expressive lead guitar work and layered harmonies. 
          His playing ranges from atmospheric textures to dynamic solos, helping shape the band’s psychedelic edge. 
          His ear for detail and tone brings an extra dimension to every performance.
        </figcaption>
      </figure>

      <figure class="bio-card">
        <img src="/images/syonn-close.jpg" alt="Syonn the drummer">
        <figcaption>
          Syonn is the pulse of Zephyr Island, driving the band forward with precision and creativity. 
          His drumming balances power and finesse, keeping everything locked in while adding subtle flair. 
          Whether on stage or in rehearsal, he’s the steady force that holds the rhythm together.
        </figcaption>
      </figure>
    </div>
  </main>
</body>
</html>
